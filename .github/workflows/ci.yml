name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install server deps
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Drift guard — committed migrations must reproduce schema.prisma
        run: >-
          npx prisma migrate diff
          --from-migrations prisma/migrations
          --to-schema-datamodel prisma/schema.prisma
          --shadow-database-url "postgresql://postgres:postgres@localhost:5432/postgres"
          --exit-code
      - name: Run test suites
        run: |
          node test/trust.test.js
          node test/escrow.test.js
          node test/teamQr.test.js
          node test/jobs.myApplication.test.js

  client-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Build client (fails the build on client errors)
        working-directory: client
        run: CI=false npm run build
