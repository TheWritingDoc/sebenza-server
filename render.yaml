services:
  - type: web
    name: sebenza-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        # Comma-separated list of allowed origins, e.g.:
        # https://sebenza-server.onrender.com,https://sebenza.app
        sync: false
      - key: PORT
        value: 3001
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production
