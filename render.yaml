services:
  - type: web
    name: sebenza-server
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        # Comma-separated list of allowed origins, e.g.:
        # https://sebenza-server.onrender.com,https://sebenza.app
        sync: false
      - key: PORT
        value: 3001
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production
